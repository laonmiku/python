<div class="my-5">
    <h1 class="text-center mb-5">{{title}} 상위 1-100위</h1>
    <div id="div_list" class="row"></div>
    {%raw%}
    <script id="temp_list" type="x-handlebars-template">
        <table class="table table-hover table-dark" style="font-size:10px">
            <thead>
                <tr>
                    <td>NO</td>
                    <td>종목명</td>
                    <td>현재가</td>
                    <td>전일비</td>
                    <td>등락률</td>
                    <td>액면가</td>
                    <td>시가총액</td>
                    <td>상장주식수</td>
                    <td>외국인비율</td>
                    <td>거래량</td>
                    <td>PER</td>
                    <td>ROE</td>
                </tr>
            </thead>
        {{#each .}}
            <tbody>
                <tr>
                    <td>{{"﻿N"}}</td>
                    <td>{{종목명}}</td>
                    <td>{{현재가}}</td>
                    <td>{{전일비}}</td>
                    <td>{{등락률}}</td>
                    <td>{{액면가}}</td>
                    <td>{{시가총액}}</td>
                    <td>{{상장주식수}}</td>
                    <td>{{외국인비율}}</td>
                    <td>{{거래량}}</td>
                    <td>{{PER}}</td>
                    <td>{{ROE}}</td>
                </tr>
            </tbody>
        {{/each}}
    </script>
    {%endraw%}
</div>

<script>
    $.ajax({
        type:'get',
        url:'/scrap/finance.json',
        success: function(data){
            console.log(JSON.parse(data));
            const temp=Handlebars.compile($("#temp_list").html());
            $("#div_list").html(temp(JSON.parse(data)));
            setTimeout(()=>{
                $("#loading").hide();
            },1000)
        }
    })
</script>
