<div class="my-5">
    <h1 class="its_title">{{title}}</h1>
    <div class="px-5">
        <form action="" name="frm">
            <input name="title" type="text"  placeholder="제목을 입력하세요" class="form-control mb-3">
            <textarea name="contents" id="" rows="10" class="form-control"></textarea>
            <div class="text-center mt-3">
                <button class="btn btn-primary px-5 me-3">등록</button>
                <button class="btn btn-danger px-5" type="reset" >취소</button>
            </div>
        </form>
    </div>
</div>
<script>
    $(frm).on("submit",function(e){
        e.preventDefault();
        const title = $(frm.title).val();
        const contents = $(frm.contents).val();
        if(title==""){
            alert("제목을 입력하세요");
            $(frm.title).focus();
            return;
        }
        //게시글등록
        console.log(uid,title,contents);
        $.ajax({
            type:"post",
            url:"/bbs/insert",
            data:JSON.stringify({uid,title,contents}),
            success:function(data){
                //alert(data);
                if(data=="success"){
                    location.href="/bbs";
                }else{
                    alert("글쓰기 실패");
                }
            }

        })
    })
</script>
